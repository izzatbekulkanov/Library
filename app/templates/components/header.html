<header class="h-16 flex items-center justify-between px-4 lg:px-8 z-10 sticky top-0 border-b border-white/20 glass-panel">
    <!-- Chap qism: Menyu tugmasi (Mobil uchun) -->
    <div class="flex items-center gap-4 w-full md:w-auto">
        <button onclick="toggleSidebarMenu()" class="text-white/80 hover:text-white focus:outline-none lg:hidden p-2 rounded-xl hover:bg-white/10 transition-colors backdrop-blur-md border border-white/5">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>
        
        <div class="hidden sm:block text-white/90 font-medium text-lg tracking-wide pl-2">
            {{ title }}
        </div>
    </div>

    <!-- O'ng qism: Tizim elementlari -->
    <div class="flex items-center justify-end gap-3 lg:gap-5 w-full md:w-auto">
        <div class="relative">
            <i class="fa-solid fa-language absolute left-3 top-1/2 -translate-y-1/2 text-white/60 pointer-events-none text-xs"></i>
            <select
                id="headerLangSwitch"
                aria-label="Tilni tanlang"
                onchange="document.cookie='lang='+this.value+'; path=/; max-age=31536000'; window.location.reload();"
                class="appearance-none pl-8 pr-8 py-2.5 text-xs font-semibold rounded-xl text-white/80 hover:text-white bg-white/5 hover:bg-white/15 border border-white/10 transition-colors backdrop-blur-md focus:outline-none"
            >
                <option value="uz" {% if current_lang == 'uz' %}selected{% endif %}>O'zbek</option>
                <option value="ru" {% if current_lang == 'ru' %}selected{% endif %}>Русский</option>
                <option value="en" {% if current_lang == 'en' %}selected{% endif %}>English</option>
            </select>
            <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-xs text-white/45 pointer-events-none"></i>
        </div>

        <button
            id="themeToggleBtn"
            type="button"
            aria-label="Kun/tun rejimini almashtirish"
            title="Kun/tun rejimi"
            class="relative p-2.5 text-white/80 hover:text-white bg-white/5 hover:bg-white/15 border border-white/10 rounded-xl transition-colors backdrop-blur-md focus:outline-none"
        >
            <i id="themeToggleIcon" class="fa-solid fa-moon text-[1.05rem]"></i>
        </button>
        
        <!-- Bildirishnomalar -->
        <button id="notifyBtn" class="relative p-2.5 text-white/80 hover:text-white bg-white/5 hover:bg-white/15 border border-white/10 rounded-xl transition-colors backdrop-blur-md focus:outline-none">
            <i class="fa-regular fa-bell text-[1.1rem]"></i>
            <span class="absolute top-1.5 right-1.5 flex h-2.5 w-2.5">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-300 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-blue-400 border border-white/50 shadow-[0_0_8px_rgba(59,130,246,0.8)]"></span>
            </span>
        </button>
        
        <div class="h-6 w-px bg-white/20 hidden sm:block"></div>
        
        <!-- Tizimdan chiqish -->
        <a href="/logout" onclick="showLoader(event, '/logout')" class="flex items-center gap-2.5 px-4 py-2 text-white hover:text-red-100 bg-white/10 hover:bg-red-500/80 rounded-xl transition-all text-sm font-medium border border-white/20 backdrop-blur-md shadow-lg">
            <span class="hidden sm:inline">Tizimdan chiqish</span>
            <i class="fa-solid fa-right-from-bracket"></i>
        </a>
    </div>
</header>
